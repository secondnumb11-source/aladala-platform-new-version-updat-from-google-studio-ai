<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500" width="100%" height="100%">
  <defs>
    <!-- Background Gradient -->
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#051026"/>
      <stop offset="100%" stop-color="#020712"/>
    </linearGradient>

    <!-- Rich Shiny Gold Gradient -->
    <linearGradient id="gold-grad" x1="0%" y1="0%" x2="100%" y2="80%">
      <stop offset="0%" stop-color="#FFEFA6"/>
      <stop offset="30%" stop-color="#D4AF37"/>
      <stop offset="70%" stop-color="#AA8C2C"/>
      <stop offset="100%" stop-color="#735B13"/>
    </linearGradient>

    <!-- Slate/Navy Metallic Blue Gradient -->
    <linearGradient id="blue-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1E3A8A"/>
      <stop offset="100%" stop-color="#0F172A"/>
    </linearGradient>

    <!-- Glow Filter for Gold Premium Looks -->
    <filter id="gold-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>

    <!-- Elegant Drop Shadow -->
    <filter id="shadow" x="-5%" y="-5%" width="110%" height="110%">
      <feDropShadow dx="0" dy="5" stdDeviation="6" flood-color="#000000" flood-opacity="0.6"/>
    </filter>
  </defs>

  <!-- Solid Background for standalone viewing -->
  <rect width="100%" height="100%" fill="url(#bg-grad)" rx="24"/>

  <!-- LOGO EMBLEM CONTAINER (Hexagon & Scales) -->
  <g transform="translate(0, -10)" filter="url(#shadow)">
    <!-- Tech Circuits / Wires on the Right -->
    <g stroke="url(#gold-grad)" stroke-width="3" fill="none" opacity="0.9">
      <!-- Wire 1 -->
      <path d="M 305 150 L 350 150 A 8 8 0 0 1 358 158" />
      <circle cx="358" cy="162" r="6" fill="url(#gold-grad)"/>
      
      <!-- Wire 2 -->
      <path d="M 315 190 L 375 190" />
      <circle cx="381" cy="190" r="6" fill="url(#gold-grad)"/>

      <!-- Wire 3 -->
      <path d="M 315 230 L 360 230 L 370 240 L 380 240" />
      <circle cx="386" cy="240" r="6" fill="url(#gold-grad)"/>

      <!-- Wire 4 -->
      <path d="M 305 270 L 340 270 L 355 285 L 365 285" />
      <circle cx="371" cy="285" r="6" fill="url(#gold-grad)"/>
    </g>

    <!-- Main Hexagon Outline -->
    <!-- Top gold portion -->
    <path d="M 250 80 L 315 117 L 315 192 M 185 192 L 185 117 L 250 80" 
          stroke="url(#gold-grad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Bottom blue portion forming the handshake wrapper -->
    <path d="M 315 192 L 315 240 L 250 278 L 185 240 L 185 192" 
          stroke="url(#blue-grad)" stroke-width="12" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

    <!-- Scale Of Justice (Gold) -->
    <g transform="translate(250, 172)" fill="url(#gold-grad)">
      <!-- Main Pillar / Column -->
      <rect x="-4" y="-72" width="8" height="74" rx="2" />
      <path d="M -12 2 L 12 2" stroke="url(#gold-grad)" stroke-width="4"/>
      <!-- Base of Pillar -->
      <path d="M -20 2 C -20 -10 20 -10 20 2 Z"/>
      <circle cx="0" cy="-75" r="7"/>

      <!-- Scale Crossbeam (Balance arm) -->
      <path d="M -50 -55 Q 0 -68 50 -55" fill="none" stroke="url(#gold-grad)" stroke-width="4.5" stroke-linecap="round"/>
      <circle cx="-50" cy="-55" r="3"/>
      <circle cx="50" cy="-55" r="3"/>

      <!-- Left Pan Connection Plates and Strings -->
      <line x1="-50" y1="-55" x2="-68" y2="-22" stroke="url(#gold-gold)" stroke-width="1.5" opacity="0.8"/>
      <line x1="-50" y1="-55" x2="-32" y2="-22" stroke="url(#gold-gold)" stroke-width="1.5" opacity="0.8"/>
      <!-- Left Pan -->
      <path d="M -72 -22 C -72 -10 -28 -10 -28 -22 Z"/>

      <!-- Right Pan Connection Plates and Strings -->
      <line x1="50" y1="-55" x2="32" y2="-22" stroke="url(#gold-gold)" stroke-width="1.5" opacity="0.8"/>
      <line x1="50" y1="-55" x2="68" y2="-22" stroke="url(#gold-gold)" stroke-width="1.5" opacity="0.8"/>
      <!-- Right Pan -->
      <path d="M 28 -22 C 28 -10 72 -10 72 -22 Z"/>
    </g>

    <!-- Shaking Hands (Integrated in the lower hex) -->
    <g transform="translate(250, 235)">
      <!-- Hand 1 (From left) -->
      <path d="M -55 -15 L -25 -12 C -18 -10 -15 -5 -18 0 L -30 18 Q -15 8 -5 0 Q -10 -12 -30 -18 Z" fill="url(#blue-grad)"/>
      <!-- Hand 2 (From right) -->
      <path d="M 55 -15 L 25 -12 C 18 -10 15 -5 18 0 L 30 18 Q 15 8 5 0 Q 10 -12 30 -18 Z" fill="#2563EB" opacity="0.85"/>
      <!-- Shaking Fingers / Bond Details -->
      <path d="M -15 -3 Q 0 -13 15 -3 M -12 2 Q 0 -8 12 2 M -8 7 Q 0 -3 8 7 M -4 12 Q 0 2 4 12" stroke="url(#gold-grad)" stroke-width="3" fill="none" stroke-linecap="round"/>
    </g>
  </g>

  <!-- ARABIC PLATFORM TYPOGRAPHY (العدالة) -->
  <g transform="translate(250, 375)" filter="url(#shadow)">
    <!-- Main Calligraphy "العدالة" Styled Text via Vector Paths for universal rendering -->
    <text x="0" y="0" 
          font-family="'Inter', 'Segoe UI', Arial, sans-serif" 
          font-size="62" 
          font-weight="900" 
          fill="url(#gold-grad)" 
          text-anchor="middle" 
          letter-spacing="2">العدالـــة</text>

    <!-- Subtext: لإدارة مكاتب المحاماة -->
    <text x="0" y="32" 
          font-family="'Inter', 'Segoe UI', Arial, sans-serif" 
          font-size="16" 
          font-weight="700" 
          fill="#FFEFA6" 
          opacity="0.9" 
          text-anchor="middle" 
          letter-spacing="4">— لإدارة مَكاتِب الموحاماة —</text>
  </g>

  <!-- Najiz Integration Ribbon at the very bottom -->
  <g transform="translate(100, 435)" filter="url(#shadow)">
    <!-- Border Badge -->
    <rect x="0" y="0" width="300" height="40" rx="10" fill="#0c162b" stroke="#D4AF37" stroke-width="1.5" stroke-opacity="0.5"/>
    
    <!-- Integration Texts (Arabic) -->
    <text x="210" y="25" font-family="sans-serif" font-size="11" font-weight="bold" fill="#ffffff" text-anchor="middle">تكامل مع منصة ناجز</text>
    <line x1="130" y1="10" x2="130" y2="30" stroke="#38bdf8" stroke-width="1.5" opacity="0.4"/>
    
    <!-- Najiz Text and Check icon -->
    <text x="90" y="25" font-family="sans-serif" font-size="12" font-weight="900" fill="#22c55e" text-anchor="middle">✓ ناجز</text>
  </g>
</svg>
