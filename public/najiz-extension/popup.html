<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>العدالة - ناجز</title>
<style>
  body {
    width: 320px;
    min-height: 200px;
    padding: 16px;
    background: #050e21;
    color: white;
    font-family: Arial, sans-serif;
    margin: 0;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
    border-bottom: 1px solid #1e3a5f;
    padding-bottom: 12px;
  }
  .title {
    font-size: 16px;
    font-weight: bold;
    color: #f59e0b;
  }
  .subtitle {
    font-size: 11px;
    color: #64748b;
    margin-top: 2px;
  }
  #status {
    font-size: 12px;
    margin-bottom: 12px;
    padding: 8px;
    background: #0a1628;
    border-radius: 8px;
    text-align: center;
    color: #94a3b8;
  }
  #extractBtn {
    width: 100%;
    padding: 12px;
    background: #f59e0b;
    color: #000;
    font-weight: bold;
    font-size: 14px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #extractBtn:disabled {
    opacity: 0.5;
    cursor: not-allowed;
  }
  #extractBtn:hover:not(:disabled) {
    background: #d97706;
  }
  #progress {
    display: none;
    text-align: center;
    font-size: 11px;
    color: #f59e0b;
    margin-top: 8px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.5; }
  }
  #results { margin-top: 8px; }
  .instructions {
    font-size: 11px;
    color: #475569;
    margin-top: 12px;
    padding: 8px;
    background: #0a1628;
    border-radius: 8px;
    line-height: 1.6;
  }
</style>
</head>
<body>
  <div class="header">
    <div>
      <div class="title">⚖️ منصة العدالة</div>
      <div class="subtitle">مزامنة بيانات ناجز</div>
    </div>
  </div>

  <div id="status">جارٍ التحقق...</div>

  <button id="extractBtn">📥 سحب البيانات من ناجز</button>

  <div id="progress">🔄 جارٍ المعالجة...</div>
  <div id="results"></div>

  <div class="instructions">
    📌 <strong>الخطوات:</strong><br>
    1. سجّل دخولك على ناجز<br>
    2. اذهب إلى <strong>قضاياي</strong> أو <strong>جلساتي</strong><br>
    3. انتظر تحميل الصفحة كاملاً<br>
    4. اضغط <strong>سحب البيانات</strong>
  </div>

  <script src="popup.js"></script>
</body>
</html>
