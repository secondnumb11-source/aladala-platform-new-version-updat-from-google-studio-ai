<!doctype html>
<html lang="ar" dir="rtl">
  <head>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-89XFD28XER"></script>
    <script>
      window.dataLayer = window.dataLayer || [];
      function gtag(){dataLayer.push(arguments);}
      gtag('js', new Date());

      gtag('config', 'G-89XFD28XER');
    </script>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>منصة العدالة لإدارة مكاتب المحاماة</title>
    <script>
      (function() {
        try {
          var isDark = localStorage.getItem('adalah-full-dark-mode') === 'true';
          var isHighContrast = localStorage.getItem('adalah-high-contrast-mode') === 'true';
          if (isDark) {
            document.documentElement.classList.add('dark');
          }
          if (isHighContrast) {
            document.body.classList.add('high-contrast-mode');
          }
        } catch (e) {}
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
