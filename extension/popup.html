<!DOCTYPE html>
<html dir="rtl" lang="ar">
<head>
<meta charset="UTF-8">
<title>العدالة - ناجز</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    width: 340px;
    min-height: 200px;
    padding: 14px;
    background: #050e21;
    color: white;
    font-family: Arial, sans-serif;
  }
  .header {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 12px;
    border-bottom: 1px solid #1e3a5f;
    padding-bottom: 10px;
  }
  .title { font-size: 15px; font-weight: bold; color: #f59e0b; }
  .subtitle { font-size: 10px; color: #475569; margin-top: 2px; }
  #status {
    font-size: 12px;
    margin-bottom: 10px;
    padding: 8px;
    background: #0a1628;
    border-radius: 8px;
    text-align: center;
    color: #94a3b8;
  }
  #pageGuide {
    font-size: 11px;
    color: #475569;
    margin-bottom: 8px;
    padding: 6px 8px;
    background: #0a1628;
    border-radius: 6px;
    border-right: 3px solid #f59e0b;
  }
  .section-title {
    font-size: 10px;
    color: #475569;
    margin: 8px 0 4px;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  #pageButtons { margin-bottom: 10px; }
  #extractBtn {
    width: 100%;
    padding: 11px;
    background: #f59e0b;
    color: #000;
    font-weight: bold;
    font-size: 13px;
    border: none;
    border-radius: 10px;
    cursor: pointer;
    transition: opacity 0.2s;
  }
  #extractBtn:disabled { opacity: 0.5; cursor: not-allowed; }
  #extractBtn:hover:not(:disabled) { background: #d97706; }
  #progress {
    display: none;
    text-align: center;
    font-size: 11px;
    color: #f59e0b;
    margin-top: 6px;
    animation: pulse 1.5s infinite;
  }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.5} }
  #results { margin-top: 8px; }
</style>
</head>
<body>
  <div class="header">
    <div>
      <div class="title">⚖️ منصة العدالة</div>
      <div class="subtitle">مزامنة ناجز v4.0 — بدون API Key</div>
    </div>
  </div>

  <div id="status">جارٍ التحقق من الصفحة...</div>
  <div id="pageGuide" style="display:none"></div>

  <div class="section-title">📌 صفحات المزامنة</div>
  <div id="pageButtons"></div>

  <button id="extractBtn">📥 سحب ومزامنة البيانات</button>
  <div id="progress">🔄 جارٍ المعالجة...</div>
  <div id="results"></div>

  <script src="popup.js"></script>
</body>
</html>
