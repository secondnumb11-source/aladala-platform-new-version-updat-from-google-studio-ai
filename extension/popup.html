<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>Najiz Sync</title>
  <style>
    body {
      width: 300px;
      padding: 16px;
      font-family: Arial, sans-serif;
      background-color: #0b1329;
      color: #FFFFFF;
      margin: 0;
    }
    h2 {
      color: #FACC15;
      font-size: 16px;
      margin-top: 0;
      border-bottom: 1px solid #D4AF37;
      padding-bottom: 8px;
    }
    .btn {
      background-color: #D4AF37;
      color: #0b1329;
      border: none;
      padding: 10px;
      width: 100%;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }
    .btn:hover {
      background-color: #FACC15;
    }
    .status {
      margin-top: 12px;
      font-size: 12px;
      color: #FFFFFF;
    }
    label {
      color: #FACC15;
      font-size: 12px;
      font-weight: bold;
      display: block;
      margin-top: 10px;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      background-color: #090f20;
      border: 1px solid #D4AF37;
      color: #FFFFFF;
      padding: 8px;
      border-radius: 6px;
      margin-top: 4px;
    }
  </style>
</head>
<body>
  <h2>مزامنة بيانات ناجز</h2>
  
  <label>API URL</label>
  <input type="text" id="apiUrl" placeholder="رابط الواجهة البرمجية">
  
  <label>API Key</label>
  <input type="password" id="apiKey" placeholder="مفتاح الوصول">
  
  <button class="btn" id="syncBtn">مزامنة الآن</button>
  <div class="status" id="statusMessage"></div>
  <script src="popup.js"></script>
</body>
</html>
